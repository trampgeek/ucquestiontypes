<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RoboTurtle World Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #eee; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

#header { background: #2c5f8a; color: white; padding: 8px 16px; font-size: 17px; font-weight: bold; flex-shrink: 0; }

#tab-bar { display: flex; align-items: center; background: #d0d8e0; padding: 5px 8px 0; gap: 3px; flex-shrink: 0; border-bottom: 2px solid #aab; }
.tab { padding: 5px 14px; cursor: pointer; background: #bbc; color: #333; border: 1px solid #99a; border-bottom: none; border-radius: 5px 5px 0 0; font-size: 13px; }
.tab.active { background: white; color: #000; border-color: #aab; font-weight: bold; }
.tab-action { padding: 4px 9px; cursor: pointer; border: 1px solid #888; border-radius: 4px; font-size: 12px; margin-left: 4px; background: #f5f5f5; }
#btn-add-tab { background: #4a9; color: white; border-color: #3a8; }

#main { display: flex; flex: 1; overflow: hidden; }

#sidebar { width: 200px; background: white; border-right: 1px solid #ccc; overflow-y: auto; padding: 8px; font-size: 12px; flex-shrink: 0; }
#sidebar h3 { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin: 10px 0 4px; padding-bottom: 2px; border-bottom: 1px solid #eee; }
#sidebar h3:first-child { margin-top: 2px; }
#sidebar label { display: block; margin: 3px 0 1px; color: #444; }
#sidebar input[type=number], #sidebar select { border: 1px solid #ccc; border-radius: 3px; padding: 2px 4px; font-size: 12px; }
#sidebar select { width: 100%; }

.tool-btn { display: block; width: 100%; text-align: left; padding: 5px 8px; margin: 2px 0; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: #f5f5f5; font-size: 12px; }
.tool-btn.active { background: #2c5f8a; color: white; border-color: #1a4a70; }
.tool-btn:hover:not(.active) { background: #e0ecff; }

.row { display: flex; gap: 6px; align-items: center; margin: 3px 0; flex-wrap: wrap; }
.row label { flex-shrink: 0; }
.row input[type=number] { width: 52px; }

.heading-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; margin: 4px 0; }
.heading-btn { padding: 4px; border: 1px solid #ccc; cursor: pointer; font-size: 11px; background: #f5f5f5; border-radius: 3px; text-align: center; }
.heading-btn.active { background: #2c5f8a; color: white; }
.heading-btn.spacer { visibility: hidden; }

.small-btn { padding: 3px 7px; cursor: pointer; border: 1px solid #ccc; border-radius: 3px; font-size: 11px; background: #f5f5f5; margin: 2px 2px 0 0; }
.small-btn:hover { background: #e0ecff; }

#canvas-wrap { flex: 1; overflow: auto; padding: 10px; background: #e8e8e8; }
canvas { border: 1px solid #aaa; display: block; background: white; cursor: crosshair; }

#json-panel { height: 150px; background: #f4f4f4; border-top: 1px solid #ccc; display: flex; gap: 8px; padding: 8px; flex-shrink: 0; }
#json-panel textarea { flex: 1; font-family: monospace; font-size: 11px; border: 1px solid #ccc; border-radius: 3px; resize: none; padding: 4px; }
#json-btns { display: flex; flex-direction: column; gap: 5px; width: 100px; flex-shrink: 0; }
#json-btns button { padding: 7px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; font-weight: bold; }
#btn-import { background: #4a9; color: white; border-color: #3a8; }
#btn-export { background: #2c5f8a; color: white; border-color: #1a4a70; }
#btn-copy { background: #555; color: white; border-color: #444; }

#status { background: #fff8dc; border-top: 1px solid #e0d060; padding: 3px 10px; font-size: 11px; color: #555; flex-shrink: 0; min-height: 20px; }

#resizer { height: 6px; background: #d0d8e0; border-top: 1px solid #aab; border-bottom: 1px solid #aab; cursor: row-resize; flex-shrink: 0; }
#resizer:hover, #resizer.active { background: #9ab; }

.item-row { display: flex; gap: 4px; align-items: center; margin: 2px 0; font-size: 11px; }
.item-row input[type=number] { width: 40px; }
.del-item { cursor: pointer; color: #c00; font-weight: bold; padding: 0 3px; }
</style>
</head>
<body>

<div id="header">RoboTurtle World Editor</div>

<div id="tab-bar">
  <button class="tab-action" id="btn-add-tab">+ Add test</button>
  <button class="tab-action" id="btn-dup-tab">Duplicate</button>
  <button class="tab-action" id="btn-del-tab">Delete</button>
</div>

<div id="main">
  <div id="sidebar">

    <h3>World Class</h3>
    <select id="sel-world-class">
      <option value="TargetWorld">TargetWorld</option>
      <option value="PathWorld">PathWorld</option>
      <option value="PickUpItemsWorld">PickUpItemsWorld</option>
    </select>
    <div id="world-params-ui"></div>

    <h3>Grid</h3>
    <div class="row">
      <label>W <input type="number" id="inp-gw" min="1" max="25" value="10"></label>
      <label>H <input type="number" id="inp-gh" min="1" max="25" value="10"></label>
    </div>
    <div class="row">
      <label>Cell px <input type="number" id="inp-cs" min="0" max="100" value="0"></label>
      <span style="color:#888;font-size:10px">(0=auto)</span>
    </div>

    <h3>Tool</h3>
    <button class="tool-btn active" data-tool="blocked" title="Click/drag cells to toggle blocked (green)">Blocked cell</button>
    <button class="tool-btn" data-tool="wall"    title="Click or drag along a grid line to add/remove a run of walls">Wall</button>
    <button class="tool-btn" data-tool="robot"   title="Click a cell to set robot start position">Robot start</button>
    <button class="tool-btn" data-tool="item"    title="Click a cell to place/remove an item">Place item</button>
    <button class="tool-btn" data-tool="path"    title="Click to add one cell; drag to extend continuously; click last cell to undo">Draw path</button>

    <div id="item-ui" style="display:none">
      <h3>Item</h3>
      <label>Type</label>
      <select id="sel-item-type">
        <option value="star">⭐ star</option>
        <option value="key">🔑 key</option>
        <option value="leaf">🍁 leaf</option>
        <option value="house">🏠 house</option>
        <option value="flag">🏁 flag</option>
        <option value="target">🎯 target</option>
        <option value="box">📦 box</option>
        <option value="trash">🗑 trash</option>
      </select>
      <div class="row" style="margin-top:4px">
        <label>Count <input type="number" id="inp-item-count" min="1" max="99" value="1"></label>
      </div>
      <label style="margin-top:4px"><input type="checkbox" id="chk-inventory"> In robot inventory</label>
    </div>

    <div id="path-ui" style="display:none">
      <h3>Path</h3>
      <div id="path-info" style="color:#555; margin:3px 0">0 cells</div>
      <button class="small-btn" onclick="undoPath()">Undo last</button>
      <button class="small-btn" onclick="clearPath()">Clear path</button>
    </div>

    <h3>Robot Heading</h3>
    <div class="heading-grid">
      <div class="heading-btn spacer"></div>
      <button class="heading-btn" data-h="north">N ↑</button>
      <div class="heading-btn spacer"></div>
      <button class="heading-btn" data-h="west">← W</button>
      <div class="heading-btn spacer"></div>
      <button class="heading-btn" data-h="east">E →</button>
      <div class="heading-btn spacer"></div>
      <button class="heading-btn" data-h="south">↓ S</button>
      <div class="heading-btn spacer"></div>
    </div>

    <h3>Items in World</h3>
    <div id="items-list"></div>
    <button class="small-btn" onclick="addInventoryItem()" style="margin-top:4px">+ Inventory item</button>

  </div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
</div>

<div id="status">Click a cell to toggle blocked (green). Use the tool buttons to switch modes.</div>

<div id="resizer" title="Drag to resize"></div>

<div id="json-panel">
  <div id="json-btns">
    <button id="btn-import">Import</button>
    <button id="btn-export">Export</button>
    <button id="btn-copy">Copy</button>
  </div>
  <textarea id="json-area" placeholder="Paste full JSON here and click Import, or click Export to generate the JSON for Moodle."></textarea>
</div>

<script>
'use strict';

// ─── Constants ───────────────────────────────────────────────────────────────

const MARGIN = 44;
const DEFAULT_CS = 60;
const ITEM_EMOJI = { star:'⭐', key:'🔑', leaf:'🍁', house:'🏠', home:'🏠', flag:'🏁', target:'🎯', box:'📦', trash:'🗑' };
const FILL_COLOR = '#4CBB17';
const WALL_COLOR = '#8B0000';
const ROBOT_COLOR = '#FF6600';
const PATH_COLOR = 'rgba(60,120,220,0.22)';
const PATH_LINE = 'rgba(40,100,200,0.75)';
const HOVER_WALL_COLOR = 'rgba(200,0,0,0.55)';
const TARGET_HOVER = 'rgba(255,255,180,0.6)';

// ─── Data model ──────────────────────────────────────────────────────────────

function newTC() {
  return {
    grid_size: [10, 10],
    cell_size: 0,          // 0 = auto; stored in world_params on export
    world_class: 'TargetWorld',
    world_params: { target: [9, 9] },
    robot_start: { position: [0, 0], heading: 'north' },
    walls: new Set(),       // canonical "x1,y1,x2,y2" strings
    blocked: new Set(),     // "x,y" strings
    items: [],              // [{type, position:[x,y]|'inventory', count}]
    path: []                // [[x,y],...] cell sequence for PathWorld
  };
}

let tests = [newTC()];
let cur = 0;
let tool = 'blocked';
let hoverCell = null;    // [gx, gy] or null
let hoverEdge = null;    // [[x1,y1],[x2,y2]] or null
let dragMode = null;     // 'add' | 'del' for blocked drag
let wallLine = null;      // { isHoriz, gridLine, startOff, adding } – drag wall state
let wallLineEnd = 0;      // current end offset for wallLine preview
let pathDragState = null; // { startCell, lastCell, hasMoved } – path drag state

function T() { return tests[cur]; }

// ─── Wall key helpers ─────────────────────────────────────────────────────────

function wKey(x1, y1, x2, y2) {
  return (x1 < x2 || (x1 === x2 && y1 < y2))
    ? `${x1},${y1},${x2},${y2}`
    : `${x2},${y2},${x1},${y1}`;
}
function wParse(k) {
  const [x1,y1,x2,y2] = k.split(',').map(Number);
  return [[x1,y1],[x2,y2]];
}

// ─── Canvas helpers ───────────────────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function cs() {
  const v = parseInt(document.getElementById('inp-cs').value) || 0;
  if (v > 0) return v;
  const t = T();
  const [gw, gh] = t.grid_size;
  return Math.max(20, Math.min(DEFAULT_CS, Math.floor(560 / Math.max(gw, gh))));
}

// Grid point → canvas pixel
function g2c(gx, gy) {
  const [, gh] = T().grid_size;
  const s = cs();
  return [MARGIN + gx * s, MARGIN + (gh - gy) * s];
}

// Cell centre → canvas pixel
function cc(gx, gy) {
  const s = cs();
  const [cx, cy] = g2c(gx, gy + 1);
  return [cx + s / 2, cy + s / 2];
}

// Canvas pixel → continuous grid coords
function c2g(px, py) {
  const [, gh] = T().grid_size;
  const s = cs();
  return [(px - MARGIN) / s, gh - (py - MARGIN) / s];
}

// Canvas pixel → cell [gx, gy] or null if outside
function c2cell(px, py) {
  const [gxf, gyf] = c2g(px, py);
  const [gw, gh] = T().grid_size;
  const gx = Math.floor(gxf), gy = Math.floor(gyf);
  return (gx >= 0 && gx < gw && gy >= 0 && gy < gh) ? [gx, gy] : null;
}

// Canvas pixel → nearest edge [[x1,y1],[x2,y2]] or null
function c2edge(px, py) {
  const [gxf, gyf] = c2g(px, py);
  const [gw, gh] = T().grid_size;
  const s = cs();
  const SNAP = s * 0.28;

  const nx = Math.round(gxf), ny = Math.round(gyf);
  const dv = Math.abs(gxf - nx) * s;
  const dh = Math.abs(gyf - ny) * s;

  let best = null, bestD = SNAP;

  if (nx >= 0 && nx <= gw && dv < bestD) {
    const cy2 = Math.floor(gyf);
    // nx===0 and nx===gw are the left/right perimeter – skip them
    if (cy2 >= 0 && cy2 < gh && nx > 0 && nx < gw) { best = [[nx, cy2], [nx, cy2+1]]; bestD = dv; }
  }
  if (ny >= 0 && ny <= gh && dh < bestD) {
    const cx2 = Math.floor(gxf);
    // ny===0 and ny===gh are the bottom/top perimeter – skip them
    if (cx2 >= 0 && cx2 < gw && ny > 0 && ny < gh) { best = [[cx2, ny], [cx2+1, ny]]; }
  }
  return best;
}

// ─── Rendering ────────────────────────────────────────────────────────────────

function render() {
  const t = T();
  const [gw, gh] = t.grid_size;
  const s = cs();
  const W = MARGIN * 2 + gw * s;
  const H = MARGIN * 2 + gh * s;
  if (canvas.width !== W || canvas.height !== H) { canvas.width = W; canvas.height = H; }

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, W, H);

  // Blocked cells
  ctx.fillStyle = FILL_COLOR;
  for (const k of t.blocked) {
    const [bx, by] = k.split(',').map(Number);
    const [cx, cy] = g2c(bx, by + 1);
    ctx.fillRect(cx, cy, s, s);
  }

  // Path background (PathWorld)
  if (t.world_class === 'PathWorld' && t.path.length > 0) {
    ctx.fillStyle = PATH_COLOR;
    for (const [px, py] of t.path) {
      const [cx, cy] = g2c(px, py + 1);
      ctx.fillRect(cx, cy, s, s);
    }
  }

  // Hover cell highlight
  if (hoverCell && tool !== 'wall') {
    const [hx, hy] = hoverCell;
    const [cx, cy] = g2c(hx, hy + 1);
    ctx.fillStyle = TARGET_HOVER;
    ctx.fillRect(cx, cy, s, s);
  }

  // Grid lines
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= gw; x++) {
    const [cx, cy1] = g2c(x, 0); const [, cy2] = g2c(x, gh);
    ctx.beginPath(); ctx.moveTo(cx, cy1); ctx.lineTo(cx, cy2); ctx.stroke();
  }
  for (let y = 0; y <= gh; y++) {
    const [cx1, cy] = g2c(0, y); const [cx2] = g2c(gw, y);
    ctx.beginPath(); ctx.moveTo(cx1, cy); ctx.lineTo(cx2, cy); ctx.stroke();
  }

  // Axis labels
  ctx.fillStyle = '#555';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let x = 0; x < gw; x++) ctx.fillText(x, MARGIN + x * s + s/2, MARGIN + gh * s + 16);
  for (let y = 0; y < gh; y++) ctx.fillText(y, MARGIN - 16, MARGIN + (gh - y - 1) * s + s/2);

  // Walls
  ctx.strokeStyle = WALL_COLOR;
  ctx.lineWidth = 3;
  ctx.lineCap = 'butt';
  for (const k of t.walls) {
    const [[x1,y1],[x2,y2]] = wParse(k);
    const [cx1,cy1] = g2c(x1,y1); const [cx2,cy2] = g2c(x2,y2);
    ctx.beginPath(); ctx.moveTo(cx1,cy1); ctx.lineTo(cx2,cy2); ctx.stroke();
  }

  // Perimeter walls (Python always adds these; shown here for fidelity)
  ctx.strokeStyle = WALL_COLOR;
  ctx.lineWidth = 3;
  ctx.lineCap = 'square';
  const [_pl, _pb] = g2c(0, 0); const [_pr, _pt] = g2c(gw, gh);
  ctx.beginPath();
  ctx.moveTo(_pl,_pb); ctx.lineTo(_pr,_pb);
  ctx.moveTo(_pl,_pt); ctx.lineTo(_pr,_pt);
  ctx.moveTo(_pl,_pb); ctx.lineTo(_pl,_pt);
  ctx.moveTo(_pr,_pb); ctx.lineTo(_pr,_pt);
  ctx.stroke();

  // Shift-drag wall preview
  if (wallLine !== null) {
    const mn = Math.min(wallLine.startOff, wallLineEnd), mx2 = Math.max(wallLine.startOff, wallLineEnd);
    ctx.lineWidth = 5; ctx.lineCap = 'butt';
    ctx.strokeStyle = wallLine.adding ? 'rgba(139,0,0,0.75)' : 'rgba(220,50,50,0.6)';
    if (!wallLine.adding) ctx.setLineDash([6, 4]);
    for (let i = mn; i <= mx2; i++) {
      let p1, p2;
      if (wallLine.isHoriz) { p1 = g2c(i, wallLine.gridLine); p2 = g2c(i+1, wallLine.gridLine); }
      else                  { p1 = g2c(wallLine.gridLine, i); p2 = g2c(wallLine.gridLine, i+1); }
      ctx.beginPath(); ctx.moveTo(p1[0],p1[1]); ctx.lineTo(p2[0],p2[1]); ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // Single-edge hover highlight (wall tool, no shift drag active)
  if (tool === 'wall' && hoverEdge && wallLine === null) {
    const [[x1,y1],[x2,y2]] = hoverEdge;
    const key = wKey(x1,y1,x2,y2);
    const [cx1,cy1] = g2c(x1,y1); const [cx2,cy2] = g2c(x2,y2);
    ctx.strokeStyle = t.walls.has(key) ? 'rgba(220,0,0,0.7)' : HOVER_WALL_COLOR;
    ctx.lineWidth = 5;
    ctx.setLineDash([5, 4]);
    ctx.beginPath(); ctx.moveTo(cx1,cy1); ctx.lineTo(cx2,cy2); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Items in world
  for (const item of t.items) {
    if (!Array.isArray(item.position)) continue;
    const [ix, iy] = item.position;
    const [cx, cy] = cc(ix, iy);
    drawEmoji(ITEM_EMOJI[item.type] || '📦', cx, cy, s * 0.5);
    if (item.count > 1) {
      ctx.font = 'bold 10px sans-serif';
      ctx.fillStyle = '#000';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(item.count, cx + s*0.22, cy - s*0.44);
    }
  }

  // Target cell (TargetWorld / PickUpItemsWorld)
  if ((t.world_class === 'TargetWorld' || t.world_class === 'PickUpItemsWorld') && t.world_params.target) {
    const [tx, ty] = t.world_params.target;
    const icon = ITEM_EMOJI[t.world_params.target_icon || 'flag'] || '🏁';
    const [cx, cy] = cc(tx, ty);
    drawEmoji(icon, cx, cy, s * 0.5);
  }

  // Item dump (PickUpItemsWorld)
  if (t.world_class === 'PickUpItemsWorld' && t.world_params.item_dump) {
    const [dx, dy] = t.world_params.item_dump.location;
    const [cx, cy] = cc(dx, dy);
    drawEmoji('🗑', cx, cy, s * 0.5);
  }

  // Labelled cells (world_params.labelled_cells)
  if (Array.isArray(t.world_params.labelled_cells)) {
    for (const [[lx, ly], iconName] of t.world_params.labelled_cells) {
      const [cx, cy] = cc(lx, ly);
      drawEmoji(ITEM_EMOJI[iconName] || '📦', cx, cy, s * 0.5);
    }
  }

  // Path line (PathWorld)
  if (t.world_class === 'PathWorld' && t.path.length > 1) {
    ctx.strokeStyle = PATH_LINE;
    ctx.lineWidth = 2;
    ctx.beginPath();
    let [px, py] = cc(t.path[0][0], t.path[0][1]);
    ctx.moveTo(px, py);
    for (let i = 1; i < t.path.length; i++) {
      [px, py] = cc(t.path[i][0], t.path[i][1]);
      ctx.lineTo(px, py);
    }
    ctx.stroke();
    // End arrowhead
    if (t.path.length >= 2) {
      const prev = cc(t.path[t.path.length-2][0], t.path[t.path.length-2][1]);
      const end  = cc(t.path[t.path.length-1][0], t.path[t.path.length-1][1]);
      drawArrow(prev, end, PATH_LINE);
    }
  }

  // Robot
  drawRobot(t.robot_start.position[0], t.robot_start.position[1], t.robot_start.heading);

  // Inventory badge
  const invItems = t.items.filter(i => i.position === 'inventory');
  if (invItems.length > 0) {
    const [rx, ry] = cc(t.robot_start.position[0], t.robot_start.position[1]);
    ctx.fillStyle = '#fff3';
    ctx.font = 'bold 10px sans-serif';
    ctx.fillStyle = '#333';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('[inv: ' + invItems.map(i => (i.count > 1 ? i.count + 'x' : '') + i.type).join(', ') + ']',
                 rx, ry + s * 0.42);
  }
}

function drawEmoji(emoji, cx, cy, size) {
  ctx.font = `${Math.floor(size)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, cx, cy + size * 0.05);
}

function drawRobot(gx, gy, heading) {
  const s = cs();
  const [cx, cy] = cc(gx, gy);
  const angleMap = { north: -Math.PI/2, east: 0, south: Math.PI/2, west: Math.PI };
  const angle = angleMap[heading] || 0;
  const r = s * 0.32;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.fillStyle = ROBOT_COLOR;
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(-r, -r * 0.65);
  ctx.lineTo(-r * 0.35, 0);
  ctx.lineTo(-r, r * 0.65);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawArrow([x1,y1], [x2,y2], color) {
  const dx = x2-x1, dy = y2-y1;
  const len = Math.sqrt(dx*dx+dy*dy);
  if (len < 1) return;
  const ux = dx/len, uy = dy/len;
  const ar = 8;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x2 - ux*ar - uy*ar*0.5, y2 - uy*ar + ux*ar*0.5);
  ctx.lineTo(x2, y2);
  ctx.lineTo(x2 - ux*ar + uy*ar*0.5, y2 - uy*ar - ux*ar*0.5);
  ctx.stroke();
}

// ─── Mouse interaction ────────────────────────────────────────────────────────

function mousePos(e) {
  const r = canvas.getBoundingClientRect();
  return [e.clientX - r.left, e.clientY - r.top];
}

canvas.addEventListener('mousemove', e => {
  const [mx, my] = mousePos(e);
  hoverCell = c2cell(mx, my);
  hoverEdge = (tool === 'wall' && wallLine === null) ? c2edge(mx, my) : null;

  if (hoverCell) setStatus(`${toolHint()} | cell (${hoverCell[0]}, ${hoverCell[1]})`);

  // Blocked drag
  if (e.buttons === 1 && tool === 'blocked' && hoverCell && dragMode) {
    const k = hoverCell.join(',');
    dragMode === 'add' ? T().blocked.add(k) : T().blocked.delete(k);
  }

  // Wall drag: update end offset
  if (wallLine !== null && e.buttons === 1) {
    const [gw2, gh2] = T().grid_size;
    if (wallLine.isHoriz) {
      wallLineEnd = Math.max(0, Math.min(gw2 - 1, Math.floor((mx - MARGIN) / cs())));
    } else {
      wallLineEnd = Math.max(0, Math.min(gh2 - 1, Math.floor(gh2 - (my - MARGIN) / cs())));
    }
  }

  // Path drag: extend path cell-by-cell as mouse moves over adjacent cells.
  // Checked against lastCell (not startCell) on every move so the cell the
  // drag started on gets included when it's already adjacent to the path end.
  if (pathDragState !== null && e.buttons === 1 && hoverCell) {
    const [lx, ly] = pathDragState.lastCell;
    const [hx, hy] = hoverCell;
    const dx = Math.abs(hx - lx), dy = Math.abs(hy - ly);
    if ((dx === 1 && dy === 0) || (dx === 0 && dy === 1)) {
      T().path.push([hx, hy]);
      pathDragState.lastCell = [hx, hy];
      pathDragState.pushed = true;
      updatePathInfo();
    }
  }

  render();
});

canvas.addEventListener('mouseleave', () => { hoverCell = null; hoverEdge = null; render(); });

canvas.addEventListener('mousedown', e => {
  const [mx, my] = mousePos(e);
  const cell = c2cell(mx, my);
  const t = T();

  if (tool === 'blocked') {
    if (!cell) return;
    const k = cell.join(',');
    if (t.blocked.has(k)) { t.blocked.delete(k); dragMode = 'del'; }
    else { t.blocked.add(k); dragMode = 'add'; }
    render();
  }
  else if (tool === 'wall') {
    // Drag to draw a run of walls; a plain click is just a drag with no movement
    const edge = c2edge(mx, my);
    if (!edge) return;
    e.preventDefault();
    const [[x1,y1],[x2,y2]] = edge;
    const isHoriz = y1 === y2;
    const k = wKey(x1,y1,x2,y2);
    wallLine = { isHoriz, gridLine: isHoriz ? y1 : x1, startOff: isHoriz ? x1 : y1, adding: !t.walls.has(k) };
    wallLineEnd = wallLine.startOff;
    render();
  }
  else if (tool === 'robot') {
    if (!cell) return;
    t.robot_start.position = [...cell];
    if (t.world_class === 'PathWorld') {
      if (t.path.length > 0) t.path[0] = [...cell];
      else t.path = [[...cell]];
      updatePathInfo();
    }
    render();
  }
  else if (tool === 'item') {
    if (!cell) return;
    placeItem(cell);
    render();
  }
  else if (tool === 'path') {
    if (!cell) return;
    if (t.world_class !== 'PathWorld') { setStatus('Switch world class to PathWorld to use this tool'); return; }
    if (t.path.length === 0) t.path = [[...t.robot_start.position]];
    const last = t.path[t.path.length - 1];
    pathDragState = { startCell: [...cell], lastCell: [...last], pushed: false };
    render();
  }
});

canvas.addEventListener('mouseup', () => {
  dragMode = null;

  // Apply wall drag (a plain click is a drag with startOff === wallLineEnd)
  if (wallLine !== null) {
    const mn = Math.min(wallLine.startOff, wallLineEnd), mx2 = Math.max(wallLine.startOff, wallLineEnd);
    for (let i = mn; i <= mx2; i++) {
      const k = wallLine.isHoriz ? wKey(i, wallLine.gridLine, i+1, wallLine.gridLine)
                                 : wKey(wallLine.gridLine, i, wallLine.gridLine, i+1);
      wallLine.adding ? T().walls.add(k) : T().walls.delete(k);
    }
    wallLine = null;
    render();
  }

  // Finalise path interaction
  if (pathDragState !== null) {
    if (!pathDragState.pushed) {
      // Drag never extended the path — treat as a plain click (add adjacent cell or undo last)
      handlePathClick(pathDragState.startCell);
      render();
    }
    pathDragState = null;
  }
});

function placeItem(cell) {
  const t = T();
  const type = document.getElementById('sel-item-type').value;
  const count = Math.max(1, parseInt(document.getElementById('inp-item-count').value) || 1);
  const inv = document.getElementById('chk-inventory').checked;
  const pos = inv ? 'inventory' : [...cell];

  // Toggle: if same type+position exists, remove it; else add
  const idx = t.items.findIndex(it => {
    if (inv) return it.position === 'inventory' && it.type === type;
    return Array.isArray(it.position) && it.position[0] === cell[0] && it.position[1] === cell[1] && it.type === type;
  });
  if (idx >= 0) t.items.splice(idx, 1);
  else t.items.push({ type, position: pos, count });
  refreshItemsList();
}

function handlePathClick(cell) {
  const t = T();
  if (t.world_class !== 'PathWorld') { setStatus('Switch world class to PathWorld to use this tool'); return; }

  if (t.path.length === 0) {
    // Start from robot start
    t.path = [[...t.robot_start.position], [...cell]];
    // If start === cell, just set [start]
    if (cell[0] === t.robot_start.position[0] && cell[1] === t.robot_start.position[1]) {
      t.path = [[...cell]];
    }
    updatePathInfo(); return;
  }

  const last = t.path[t.path.length - 1];
  const dx = Math.abs(cell[0] - last[0]), dy = Math.abs(cell[1] - last[1]);

  if (dx === 0 && dy === 0) {
    // Clicked same cell: undo
    t.path.pop();
  } else if ((dx === 1 && dy === 0) || (dx === 0 && dy === 1)) {
    t.path.push([...cell]);
  } else {
    setStatus(`Cell (${cell[0]},${cell[1]}) is not adjacent to path end (${last[0]},${last[1]})`);
    return;
  }
  updatePathInfo();
}

function updatePathInfo() {
  const n = T().path.length;
  document.getElementById('path-info').textContent = n === 0 ? '0 cells' : `${n} cells (ends at ${T().path[n-1]})`;
}

function undoPath() { if (T().path.length > 0) { T().path.pop(); updatePathInfo(); render(); } }
function clearPath() { T().path = []; updatePathInfo(); render(); }

        <option value="target" ${t.world_params.target_icon==='target'?'selected':''}>🎯 target</option>
        <option value="house" ${(t.world_params.target_icon==='house'||t.world_params.target_icon==='home')?'selected':''}>🏠 house/home</option>

    div.insertAdjacentHTML('beforeend', `

    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `<span>${emoji}</span> <span>${item.type}</span> <span style="color:#888">@${pos}</span>`

function rebuildTabs() {
  document.querySelectorAll('.tab').forEach(t => t.remove());
  const bar = document.getElementById('tab-bar');
  const first = document.getElementById('btn-add-tab');
  tests.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i===cur?' active':'');
    btn.textContent = `Test ${i+1}`;
    btn.onclick = () => { cur = i; loadUI(); rebuildTabs(); render(); };
    bar.insertBefore(btn, first);
  });
}

document.getElementById('btn-add-tab').onclick = () => {
  tests.push(newTC()); cur = tests.length-1; loadUI(); rebuildTabs(); render();
};
document.getElementById('btn-dup-tab').onclick = () => {
  tests.splice(cur+1, 0, deepCopy(T())); cur++; loadUI(); rebuildTabs(); render();
};
document.getElementById('btn-del-tab').onclick = () => {
  if (tests.length <= 1) { setStatus('Cannot delete the only test case'); return; }
  if (!confirm(`Delete Test ${cur+1}? This cannot be undone.`)) return;
  tests.splice(cur, 1); cur = Math.min(cur, tests.length-1); loadUI(); rebuildTabs(); render();
};

function deepCopy(t) {
  return {
    grid_size: [...t.grid_size], cell_size: t.cell_size,
    world_class: t.world_class,
    world_params: JSON.parse(JSON.stringify(t.world_params)),
    robot_start: { position: [...t.robot_start.position], heading: t.robot_start.heading },
    walls: new Set(t.walls), blocked: new Set(t.blocked),
    items: t.items.map(it => ({...it, position: Array.isArray(it.position)?[...it.position]:it.position})),
    path: t.path.map(p => [...p])
  };

  document.getElementById('inp-gw').value = t.grid_size[0];

// ─── Export / Import ─────────────────────────────────────────────────────────

function exportTC(t) {
  const wp = {...t.world_params};
  if (t.cell_size > 0) wp.cell_size = t.cell_size;
  if (t.world_class === 'PathWorld') wp.path = pathToSegs(t.path);

  const obj = {
    grid_size: t.grid_size,
    world_class: t.world_class,
    world_params: wp,
    robot_start: t.robot_start
  };

  const bc = exportBlocked(t);
  if (bc.length) obj.blocked_cells = bc;

  const wl = exportWalls(t);
  if (wl.length) obj.walls = wl;

  if (t.items.length) obj.items = t.items;
  return obj;
}

function pathToSegs(path) {
  if (path.length < 2) return [];
  const segs = [];
  let segStart = path[0];
  for (let i = 1; i < path.length; i++) {
    const atEnd = (i === path.length - 1);
    const dirChanged = i > 1 && dir(path[i-2], path[i-1]) !== dir(path[i-1], path[i]);
    if (dirChanged) { segs.push([segStart, path[i-1]]); segStart = path[i-1]; }
    if (atEnd) segs.push([segStart, path[i]]);
  }
  return segs;
}

function dir([x1,y1], [x2,y2]) {
  if (x2 > x1) return 'E'; if (x2 < x1) return 'W';
  if (y2 > y1) return 'N'; return 'S';
}

function exportBlocked(t) {
  // Group cells by row, merge consecutive x-runs into rectangle spans [[x0,y],[x1,y]]
  const byRow = new Map();
  for (const k of t.blocked) {
    const [x, y] = k.split(',').map(Number);
    if (!byRow.has(y)) byRow.set(y, []);
    byRow.get(y).push(x);
  }
  const out = [];
  for (const [y, xs] of byRow) {
    xs.sort((a, b) => a - b);
    let s = xs[0], p = xs[0];
    for (let i = 1; i < xs.length; i++) {
      if (xs[i] === p + 1) { p = xs[i]; }
      else { out.push([[s, y], [p, y]]); s = xs[i]; p = xs[i]; }
    }
    out.push([[s, y], [p, y]]);
  }
  return out;
}

function exportWalls(t) {
  const [gw, gh] = t.grid_size;
  const hmap = new Map(), vmap = new Map();
  for (const k of t.walls) {
    const [[x1,y1],[x2,y2]] = wParse(k);
    // Skip perimeter walls – Python adds them automatically
    if (y1 === y2 && (y1 === 0 || y1 === gh)) continue;
    if (x1 === x2 && (x1 === 0 || x1 === gw)) continue;
    if (y1 === y2) { if (!hmap.has(y1)) hmap.set(y1,[]); hmap.get(y1).push(x1); }
    else           { if (!vmap.has(x1)) vmap.set(x1,[]); vmap.get(x1).push(y1); }
  }
  const out = [];
  function mergeRuns(vals, fixedA, isHoriz) {
    vals.sort((a,b)=>a-b);
    let s=vals[0], p=vals[0];
    for (let i=1;i<vals.length;i++) {
      if (vals[i]===p+1) { p=vals[i]; }
      else { out.push(isHoriz ? [[s,fixedA],[p+1,fixedA]] : [[fixedA,s],[fixedA,p+1]]); s=vals[i]; p=vals[i]; }
    }
    out.push(isHoriz ? [[s,fixedA],[p+1,fixedA]] : [[fixedA,s],[fixedA,p+1]]);
  }
  for (const [y,xs] of hmap) mergeRuns(xs, y, true);
  for (const [x,ys] of vmap) mergeRuns(ys, x, false);
  return out;
}

// Returns true if val should be serialized on a single line:
// numbers/strings/booleans/null, arrays of numbers, or arrays of number-arrays.
function isCompact(val) {
  if (val === null || typeof val !== 'object') return true;
  if (Array.isArray(val)) {
    return val.every(v => typeof v === 'number' ||
      (Array.isArray(v) && v.every(n => typeof n === 'number')));
  }
  return false;
}

// Like JSON.stringify(val, null, 2) but keeps coordinate-like arrays on one line.
function smartJSON(val, indent) {
  indent = indent || 0;
  const step = 2;
  if (isCompact(val)) return JSON.stringify(val);
  if (Array.isArray(val)) {
    const pad = ' '.repeat(indent + step);
    const close = ' '.repeat(indent);
    return '[\n' + val.map(v => pad + smartJSON(v, indent + step)).join(',\n') + '\n' + close + ']';
  }
  // object
  const pad = ' '.repeat(indent + step);
  const close = ' '.repeat(indent);
  const entries = Object.entries(val)
    .map(([k, v]) => pad + JSON.stringify(k) + ': ' + smartJSON(v, indent + step));
  return '{\n' + entries.join(',\n') + '\n' + close + '}';
}

function buildOutput() {
  return smartJSON({ testcases: tests.map(exportTC) });
}

document.getElementById('btn-export').onclick = () => {
  document.getElementById('json-area').value = buildOutput();
  setStatus('JSON exported — paste into Moodle template parameters field as the value of "testcases"');
};

document.getElementById('btn-copy').onclick = () => {
  const text = buildOutput();
  document.getElementById('json-area').value = text;
  navigator.clipboard ? navigator.clipboard.writeText(text).then(() => setStatus('Copied to clipboard'))
                      : (document.getElementById('json-area').select(), document.execCommand('copy'), setStatus('Copied'));
};

document.getElementById('btn-import').onclick = () => {
  const raw = document.getElementById('json-area').value.trim();
  if (!raw) { setStatus('Paste JSON into the text area first'); return; }
  try {
    const data = JSON.parse(raw);
    const arr = data.testcases ? data.testcases : (Array.isArray(data) ? data : [data]);
    tests = arr.map(importTC);
    cur = 0; loadUI(); rebuildTabs(); render();
    setStatus(`Imported ${tests.length} test case(s)`);
  } catch(err) {
    setStatus('Import error: ' + err.message);
  }
};

function importTC(data) {
  const t = newTC();
  t.grid_size = data.grid_size || [10,10];
  t.world_class = data.world_class || 'TargetWorld';
  t.world_params = JSON.parse(JSON.stringify(data.world_params || {}));
  t.robot_start = JSON.parse(JSON.stringify(data.robot_start || {position:[0,0],heading:'north'}));
  t.cell_size = t.world_params.cell_size || 0;
  delete t.world_params.cell_size;  // store separately, re-add on export

  // Walls: expand multi-cell segments to unit segments (skip perimeter – always drawn separately)
  t.walls = new Set();
  const [gw_i, gh_i] = t.grid_size;
  for (const [[x1,y1],[x2,y2]] of (data.walls||[])) {
    if (x1===x2) { const mn=Math.min(y1,y2),mx=Math.max(y1,y2); for(let y=mn;y<mx;y++) {
      if (x1>0 && x1<gw_i) t.walls.add(wKey(x1,y,x1,y+1));
    }}
    else { const mn=Math.min(x1,x2),mx=Math.max(x1,x2); for(let x=mn;x<mx;x++) {
      if (y1>0 && y1<gh_i) t.walls.add(wKey(x,y1,x+1,y1));
    }}
  }

  // Blocked cells: expand rectangles
  t.blocked = new Set();
  for (const [[x0,y0],[x1,y1]] of (data.blocked_cells||[])) {
    for (let x=Math.min(x0,x1);x<=Math.max(x0,x1);x++)
      for (let y=Math.min(y0,y1);y<=Math.max(y0,y1);y++)
        t.blocked.add(`${x},${y}`);
  }

  t.items = JSON.parse(JSON.stringify(data.items||[]));

  // Path (PathWorld): expand segments to cell list
  if (t.world_class === 'PathWorld' && Array.isArray(t.world_params.path)) {
    t.path = expandSegs(t.world_params.path);
    delete t.world_params.path;  // stored in t.path; re-added on export
  }

  return t;
}

function expandSegs(segs) {
  const cells = [];
  for (const [[x0,y0],[x1,y1]] of segs) {
    const dx=Math.sign(x1-x0), dy=Math.sign(y1-y0);
    let x=x0, y=y0;
    if (!cells.length || cells[cells.length-1][0]!==x || cells[cells.length-1][1]!==y) cells.push([x,y]);
    while (x!==x1||y!==y1) { x+=dx; y+=dy; cells.push([x,y]); }
  }
  return cells;
}

// ─── Bottom panel resizer ─────────────────────────────────────────────────────

(function () {
  const resizer = document.getElementById('resizer');
  const jsonPanel = document.getElementById('json-panel');
  resizer.addEventListener('mousedown', e => {
    e.preventDefault();
    const startY = e.clientY;
    const startHeight = jsonPanel.getBoundingClientRect().height;
    resizer.classList.add('active');
    function onMove(e2) {
      const newHeight = Math.max(60, Math.min(window.innerHeight - 200, startHeight + (startY - e2.clientY)));
      jsonPanel.style.height = newHeight + 'px';
    }
    function onUp() {
      resizer.classList.remove('active');
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
})();

// ─── Status bar ──────────────────────────────────────────────────────────────

function setStatus(msg) { document.getElementById('status').textContent = msg; }

// ─── Boot ─────────────────────────────────────────────────────────────────────

loadUI();
rebuildTabs();
render();
setStatus(toolHint());
</script>
</body>
</html>
